<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>WebGL Example File</title>

    <script id="vshader" type="x-shader/x-vertex">

        attribute vec4 vPosition;
        uniform mat4 modelMatrix;
        uniform mat4 viewMatrix;
        uniform mat4 cameraMatrix;
        attribute vec4 vColor;
        varying vec4 fColor;
        uniform bool cube;
        attribute vec4 weights;
        attribute float weight5;
	    uniform mat4 boneMatrix0;
	    uniform mat4 boneMatrix1;
	    uniform mat4 boneMatrix2;
	    uniform mat4 boneMatrix3;
	    uniform mat4 boneMatrix4;

        void main() {
            gl_PointSize = 5.0;
            if(cube) {
                vec4 pos = modelMatrix * (weights[0]*boneMatrix0+weights[1]*boneMatrix1+weights[2]*boneMatrix2+weights[3]*boneMatrix3+weight5*boneMatrix4) * vPosition;
                gl_Position = viewMatrix * cameraMatrix * pos;
            } else {
                gl_Position = viewMatrix * cameraMatrix * vPosition;
            }
            fColor = vColor;
        }
    </script>

    <script id="fshader" type="x-shader/x-fragment">
        precision mediump float;
        varying vec4 fColor;
        void main() {
            gl_FragColor = fColor;
        }
    </script>

    <script src="lib/webgl-utils.js"></script>
    <script src="lib/initShaders.js"></script>
    <script src="lib/MV.js"></script>

    <script src="example.js"></script>

</head>

<body onload="main()">

<canvas id="webgl" width="400" height="400">
    Please use a browser that supports the "canvas" tag.
</canvas>

<form id="fileupload" enctype="multipart/form-data">
    <input type="file" id="files" name="files[]" />
</form>

</body>
</html>
