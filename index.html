<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>My Vector Graphics Editor</title>

    <script id="vshader" type="x-shader/x-vertex">
        attribute  vec4 vPosition;
        attribute  vec4 vColor;
        attribute vec3 vNormal;

        uniform mat4 modelMatrix;
        uniform mat4 projMatrix;
        uniform mat4 cameraMatrix;
        uniform mat3 normalMatrix;

        varying vec3 fNormal;
        varying vec3 fPosition;
        varying vec4 fColor;

        attribute vec4 weights;
        uniform mat4 boneMatrix0;
        uniform mat4 boneMatrix1;
        uniform mat4 boneMatrix2;
        uniform mat4 boneMatrix3;

        uniform bool flag;

        void main() {
            vec4 worldPos;
            if (flag) {
                worldPos = (weights[0]*boneMatrix0+weights[1]*boneMatrix1+weights[2]*boneMatrix2+weights[3]*boneMatrix3) * vPosition;
            } else {
                worldPos = modelMatrix * vPosition;
            }
            gl_Position = projMatrix * cameraMatrix * worldPos;

            fPosition = worldPos.xyz;
            fNormal = normalize(normalMatrix * vNormal);
            fColor = vColor;
        }
    </script>

    <script id="fshader" type="x-shader/x-fragment">
        precision mediump float;

        varying vec3 fNormal;
        varying vec3 fPosition;
        varying vec4 fColor;

        uniform vec3 lightPosition;
        uniform vec3 eyePosition;

        uniform vec4 ambientProduct;
        uniform vec4 diffuseProduct;
        uniform vec4 specularProduct;
        uniform float shininess;

        void main()
        {
            vec3 N = normalize(fNormal);
            vec3 L = normalize(lightPosition - fPosition);
            vec3 E = normalize(eyePosition - fPosition);
            vec3 H = normalize(L + E);

            vec4 ambient = ambientProduct * fColor;

            float Kd = max(dot(N, L), 0.0);
            vec4 diffuse = Kd * diffuseProduct * fColor;

            float Ks = pow(max(dot(N, H), 0.0), shininess);
            vec4 specular = Ks * specularProduct;

            if(dot(N, L) < 0.0) {
                specular = vec4(0.0);
            }

            gl_FragColor = ambient + diffuse + specular;
            gl_FragColor.a = 1.0;
        }
    </script>

    <script src="lib/webgl-utils.js"></script>
    <script src="lib/initShaders.js"></script>
    <script src="lib/MV.js"></script>
    <script src="lib/cs4731pjt1.js"></script>

    <script src="main.js"></script>

</head>

<body onload="main()">

<div style="text-align: center">
    <h1 id='htitle'>Car Simulation Scene</h1>

    <canvas id="webgl" width="400" height="400" style="border: 1px solid black;">
        Please use a browser that supports the "canvas" tag.
    </canvas>

</div>

</body>
</html>
